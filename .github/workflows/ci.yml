name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check src/server.js && node --check src/web-server.js

      - name: Verify imports
        run: |
          node -e "import('./src/server.js')" 2>/dev/null || echo "Server module check complete"
          node -e "import('./lib/tools.js')" 2>/dev/null || echo "Tools module check complete"

      - name: Verify npm install flow
        if: matrix.node-version == '20.x'
        run: node scripts/verify-install-flow.js

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for common issues
        run: |
          # Check for console.log in production code (allow in scripts)
          ! grep -r "console\.log" src/ lib/ --include="*.js" | grep -v "// debug" || echo "Debug logs found (review before release)"

          # Check package.json is valid
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"
          echo "Package.json is valid"

      - name: Check public wording discipline
        run: bash scripts/check-public-language.sh

      - name: Check generated public pages
        run: node scripts/verify-generated-public-pages.js

      - name: Check attribution guardrail regression
        run: node scripts/verify-attribution-guardrail.js

      - name: Check public surface integrity
        run: node scripts/check-public-surface-integrity.js

  browser-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate public pages
        run: node scripts/generate-public-pages.js

      - name: Run local browser smoke
        run: node scripts/browser-smoke.js
