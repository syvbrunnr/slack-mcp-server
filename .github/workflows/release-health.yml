name: Release Health

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7,19 * * *"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Capture baseline snapshot
        run: |
          if [ -f output/release-health/latest.md ]; then
            cp output/release-health/latest.md /tmp/release-health-before.md
          fi

      - name: Collect current release-health snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/collect-release-health.js

      - name: Build automated delta report
        run: |
          if [ -f /tmp/release-health-before.md ]; then
            node scripts/build-release-health-delta.js \
              --before /tmp/release-health-before.md \
              --after output/release-health/latest.md \
              --out output/release-health/automation-delta.md
          else
            node scripts/build-release-health-delta.js \
              --after output/release-health/latest.md \
              --out output/release-health/automation-delta.md
          fi

      - name: Publish workflow summary
        run: |
          cat output/release-health/latest.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat output/release-health/automation-delta.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release-health artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-health-${{ github.run_id }}
          path: |
            output/release-health/latest.md
            output/release-health/automation-delta.md
